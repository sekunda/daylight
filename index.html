<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daylight beads — daily</title>
    <style>
        :root{
            --bg: #ffffff;
            --panel: rgba(0,0,0,.04);
            --text: rgba(0,0,0,.86);
            --muted: rgba(0,0,0,.60);
            --border: rgba(0,0,0,.12);
            --line: rgba(0,0,0,.14);
            --lineStrong: rgba(0,0,0,.22);
            --accent: #ff4f9a;
            --todayFill: #ff7ab6;
            --mirrorStroke: #5c7cff;
            --mirrorFill: #8ea2ff;
        }

        html, body { height: 100%; }

        body{
            margin:0;
            overflow:hidden;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            cursor: default;
        }

        .hud{
            position: fixed;
            top: 14px;
            left: 14px;
            right: 14px;
            display:flex;
            gap:12px;
            align-items: stretch;
            z-index: 10;
        }

        .card{
            background: linear-gradient(180deg, var(--panel), rgba(0,0,0,.02));
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            backdrop-filter: blur(10px);
        }

        .title{
            display:flex;
            flex-direction:column;
            justify-content:center;
            gap:2px;
            padding: 10px 14px;
            min-width: 240px;
        }

        .title .h{
            font-weight: 700;
            font-size: 14px;
            letter-spacing:.2px;
        }

        .title .s{
            font-size: 12px;
            color: var(--muted);
        }

        .controls{
            display:flex;
            flex-wrap:wrap;
            gap:10px 12px;
            align-items:center;
            padding: 10px 12px;
        }

        label{
            display:flex;
            gap:8px;
            align-items:center;
            font-size: 12px;
            color: var(--muted);
            user-select:none;
            white-space:nowrap;
        }

        select, input[type="range"], button{
            font: inherit;
        }

        select{
            background: rgba(255,255,255,.9);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 6px 10px;
            outline:none;
        }

        input[type="range"]{
            width: 140px;
            accent-color: var(--accent);
        }

        button{
            background: rgba(255,79,154,.12);
            border: 1px solid rgba(255,79,154,.35);
            color: var(--text);
            border-radius: 12px;
            padding: 7px 10px;
            cursor:pointer;
        }

        button:hover{
            background: rgba(255,79,154,.18);
        }

        .hint{
            position: fixed;
            bottom: 14px;
            left: 14px;
            right: 14px;
            z-index: 10;
            display:flex;
            justify-content:space-between;
            gap:12px;
            pointer-events:none;
        }

        .hint .card{
            pointer-events:none;
            padding: 10px 12px;
            border-radius: 14px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.2;
        }

        .center-info{
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: auto;
            min-width: 260px;
            max-width: min(72vw, 560px);
            background: rgba(255,255,255,.96);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,.10);
            text-align: center;
            opacity: 0;
            transition: opacity .12s ease;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .center-info.dragging{
            cursor: grabbing;
        }

        .center-info .d{
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .center-info .m{
            font-size: 13px;
            color: var(--muted);
            line-height: 1.35;
        }

        .center-info .rel{
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.35;
            color: var(--text);
        }

        .center-info .tag{
            display:inline-block;
            margin-top: 10px;
            font-size: 11px;
            color: rgba(0,0,0,.80);
            background: rgba(0,0,0,.05);
            border: 1px solid rgba(0,0,0,.10);
            padding: 4px 8px;
            border-radius: 999px;
        }

        #stage{
            width:100vw;
            height:100vh;
            display:block;
            cursor: default;
            touch-action: none;
        }

        #stage.dragging{
            cursor: grab;
        }

        #stage.dragging:active{
            cursor: grabbing;
        }

        .ringLine{
            stroke: var(--line);
            stroke-width: 1.2;
            fill:none;
            pointer-events: none;
        }

        .ringLine.strong{
            stroke: var(--lineStrong);
            stroke-width: 2;
            opacity:.45;
            pointer-events: none;
        }

        .day{
            --r: 5px;
            --rh: 9px;
            cursor: grab;
        }

        .day:active{
            cursor: grabbing;
        }

        .day circle{
            stroke: rgba(0,0,0,.10);
            stroke-width: .7;
            transition:
                    r 140ms ease,
                    stroke-width 140ms ease,
                    filter 140ms ease,
                    fill 140ms ease,
                    opacity 140ms ease;
            r: var(--r);
            transform-origin: center;
        }

        .day:hover .day-main,
        .day.active-hover .day-main{
            r: var(--rh);
            stroke-width: 1.4;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,.12));
        }

        .day.today circle{
            stroke: var(--accent);
            stroke-width: 2;
        }

        .day.today .today-main{
            fill: var(--todayFill) !important;
            filter: drop-shadow(0 0 10px rgba(255,122,182,.35));
        }

        .day.special .day-main{
            stroke: rgba(0,0,0,.55);
            stroke-width: 1.6;
        }

        .day.mirror-match .day-main{
            stroke: var(--mirrorStroke);
            stroke-width: 2.2;
            fill: var(--mirrorFill) !important;
            filter: drop-shadow(0 0 12px rgba(92,124,255,.30));
        }

        .day.dragging-day .day-main{
            stroke-width: 2.4;
            filter: drop-shadow(0 8px 14px rgba(0,0,0,.18));
        }

        .monthTick{
            stroke: rgba(0,0,0,.35);
            stroke-width: 2;
            stroke-linecap: round;
            pointer-events: none;
        }

        .quarterTick{
            stroke: rgba(0,0,0,.55);
            stroke-width: 3;
            stroke-linecap: round;
            pointer-events: none;
        }

        .monthLabel{
            fill: rgba(0,0,0,.55);
            font-size: 12px;
            letter-spacing:.2px;
            text-anchor: middle;
            dominant-baseline: middle;
            user-select:none;
            pointer-events: none;
        }

        @media (max-width: 900px){
            .hud{
                flex-direction: column;
                align-items: stretch;
                left: 10px;
                right: 10px;
                top: 10px;
                gap: 10px;
            }

            .title{
                min-width: 0;
            }

            .controls{
                gap: 8px 10px;
            }

            label{
                font-size: 11px;
            }

            input[type="range"]{
                width: 110px;
            }

            .hint{
                left: 10px;
                right: 10px;
                bottom: 10px;
                flex-direction: column;
                align-items: stretch;
            }

            .center-info{
                min-width: 0;
                width: min(92vw, 420px);
                max-width: 92vw;
                padding: 12px 14px;
            }

            .center-info .d{
                font-size: 15px;
            }

            .center-info .m,
            .center-info .rel{
                font-size: 12px;
            }

            .monthLabel{
                font-size: 10px;
            }
        }

        @media (max-width: 560px){
            .controls{
                padding: 8px 10px;
            }

            button{
                padding: 6px 9px;
            }

            .hint .card{
                font-size: 11px;
            }

            .title .h{
                font-size: 13px;
            }

            .title .s{
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="hud">
    <div class="card title">
        <div class="h" id="titleMain">Daylight beads (daily)</div>
        <div class="s" id="subtitle">—</div>
    </div>

    <div class="card controls">
        <label>
            <span id="labelLanguage">Język</span>
            <select id="languageMode">
                <option value="pl" selected>Polski</option>
                <option value="en">English</option>
            </select>
        </label>

        <label>
            <span id="labelOrientation">Orientation</span>
            <select id="startMode">
                <option value="jan1">Jan 1 at top</option>
                <option value="solstice" selected>Summer solstice at top</option>
            </select>
        </label>

        <label>
            <span id="labelLines">Lines</span>
            <select id="lineMode">
                <option value="poly">On</option>
                <option value="none">Off</option>
            </select>
        </label>

        <label>
            <span id="labelSize">Bead size</span>
            <input id="size" type="range" min="1" max="15" value="4" />
        </label>

        <label>
            <span id="labelZoom">Zoom</span>
            <input id="zoom" type="range" min="35" max="220" value="100" />
        </label>

        <button id="reset">Reset view</button>
    </div>
</div>

<svg id="stage" role="img" aria-label="Daily beads calendar"></svg>

<div class="hint">
    <div class="card" id="hintMain">
        Kliknij i przeciągnij tło, żeby przesuwać • Scroll = zoom • Złap koralik i przeciągnij • Hover zapamiętuje ostatnią aktywną kulkę
    </div>
    <div class="card" id="stats">—</div>
</div>

<div class="center-info" id="centerInfo">
    <div class="d" id="centerDate">—</div>
    <div class="m" id="centerMeta">—</div>
    <div class="rel" id="centerRelation">—</div>
    <div class="tag" id="centerTag" style="display:none">—</div>
</div>

<script>
    (() => {
        const svg = document.getElementById('stage');

        const centerInfo = document.getElementById('centerInfo');
        const centerDate = document.getElementById('centerDate');
        const centerMeta = document.getElementById('centerMeta');
        const centerRelation = document.getElementById('centerRelation');
        const centerTag  = document.getElementById('centerTag');

        const subtitle = document.getElementById('subtitle');
        const stats = document.getElementById('stats');

        const titleMain = document.getElementById('titleMain');
        const labelLanguage = document.getElementById('labelLanguage');
        const labelOrientation = document.getElementById('labelOrientation');
        const labelLines = document.getElementById('labelLines');
        const labelSize = document.getElementById('labelSize');
        const labelZoom = document.getElementById('labelZoom');
        const hintMain = document.getElementById('hintMain');

        const languageModeEl = document.getElementById('languageMode');
        const startModeEl = document.getElementById('startMode');
        const lineModeEl  = document.getElementById('lineMode');
        const sizeEl      = document.getElementById('size');
        const zoomEl      = document.getElementById('zoom');
        const resetEl     = document.getElementById('reset');

        const I18N = {
            pl: {
                htmlLang: 'pl',
                pageTitle: 'Daylight beads — daily',
                stageAria: 'Dzienny kalendarz koralikowy',
                title: 'Daylight beads (daily)',
                language: 'Language',
                orientation: 'Orientacja',
                lines: 'Linie',
                beadSize: 'Rozmiar koralików',
                zoom: 'Zoom',
                resetView: 'Reset view',
                startJan1: '1 stycznia u góry',
                startSolstice: 'Przesilenie letnie u góry',
                linesOn: 'Wł.',
                linesOff: 'Wył.',
                hint: 'Kliknij i przeciągnij tło, żeby przesuwać • Scroll = zoom • Złap koralik i przeciągnij • Hover zapamiętuje ostatnią aktywną kulkę',
                subtitle: ({year, days, top}) => `${year} • ${days} dni • widok: cały bieżący rok • góra: ${top}`,
                subtitleTopJan1: '1 stycznia',
                subtitleTopSolstice: 'przesilenie letnie',
                statsRange: ({from, to}) => `Zakres: ${from} → ${to}`,
                centerMeta: ({dayIndex, yearLength, value, gray}) =>
                    `Dzień ${dayIndex} z ${yearLength} • daylight=${value} • kolor RGB(${gray}, ${gray}, ${gray})`,
                centerRelationSame: ({date}) =>
                    `${date} odpowiada samemu sobie`,
                centerRelationMirror: ({date, mirrorDate}) =>
                    `${date} odpowiada ${mirrorDate} dla tej samej wartości daylight`,
                today: 'Dzisiaj',
                monthNames: ['Sty', 'Lut', 'Mar', 'Kwi', 'Maj', 'Cze', 'Lip', 'Sie', 'Wrz', 'Paź', 'Lis', 'Gru'],
                dateLocale: 'pl-PL',
                specialTags: {
                    spring: 'Równonoc marcowa',
                    summer: 'Przesilenie letnie',
                    autumn: 'Równonoc wrześniowa',
                    winter: 'Przesilenie zimowe'
                }
            },
            en: {
                htmlLang: 'en',
                pageTitle: 'Daylight beads — daily',
                stageAria: 'Daily bead calendar',
                title: 'Daylight beads (daily)',
                language: 'Język',
                orientation: 'Orientation',
                lines: 'Lines',
                beadSize: 'Bead size',
                zoom: 'Zoom',
                resetView: 'Reset view',
                startJan1: 'Jan 1 at top',
                startSolstice: 'Summer solstice at top',
                linesOn: 'On',
                linesOff: 'Off',
                hint: 'Drag the background to pan • Scroll = zoom • Grab a bead and drag it • Hover remembers the last active bead',
                subtitle: ({year, days, top}) => `${year} • ${days} days • view: current year • top: ${top}`,
                subtitleTopJan1: 'Jan 1',
                subtitleTopSolstice: 'summer solstice',
                statsRange: ({from, to}) => `Range: ${from} → ${to}`,
                centerMeta: ({dayIndex, yearLength, value, gray}) =>
                    `Day ${dayIndex} of ${yearLength} • daylight=${value} • color RGB(${gray}, ${gray}, ${gray})`,
                centerRelationSame: ({date}) =>
                    `${date} maps to itself`,
                centerRelationMirror: ({date, mirrorDate}) =>
                    `${date} maps to ${mirrorDate} for the same daylight value`,
                today: 'Today',
                monthNames: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                dateLocale: 'en-US',
                specialTags: {
                    spring: 'March equinox',
                    summer: 'Summer solstice',
                    autumn: 'September equinox',
                    winter: 'Winter solstice'
                }
            }
        };

        let currentLang = languageModeEl.value || 'pl';

        const isLeapYear = (y) => (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const EPS = 1e-12;

        function t(){
            return I18N[currentLang];
        }

        function applyStaticI18n(){
            const tr = t();

            document.documentElement.lang = tr.htmlLang;
            document.title = tr.pageTitle;
            svg.setAttribute('aria-label', tr.stageAria);

            titleMain.textContent = tr.title;
            labelLanguage.textContent = tr.language;
            labelOrientation.textContent = tr.orientation;
            labelLines.textContent = tr.lines;
            labelSize.textContent = tr.beadSize;
            labelZoom.textContent = tr.zoom;
            resetEl.textContent = tr.resetView;
            hintMain.textContent = tr.hint;

            startModeEl.options[0].textContent = tr.startJan1;
            startModeEl.options[1].textContent = tr.startSolstice;

            lineModeEl.options[0].textContent = tr.linesOn;
            lineModeEl.options[1].textContent = tr.linesOff;
        }

        function mod(n, m){
            return ((n % m) + m) % m;
        }

        function dayOfYear0(d){
            const start = new Date(d.getFullYear(), 0, 1);
            return Math.floor((d - start) / 86400000);
        }

        function specialTag(date){
            const m = date.getMonth(), dd = date.getDate();
            const approx = [
                { m: 2,  d: 21, name: t().specialTags.spring },
                { m: 5,  d: 22, name: t().specialTags.summer },
                { m: 8,  d: 22, name: t().specialTags.autumn },
                { m: 11, d: 20, name: t().specialTags.winter },
            ];
            for (const a of approx){
                if (m === a.m && Math.abs(dd - a.d) <= 1) return a.name;
            }
            return null;
        }

        function getSolarAnchors(yearLength){
            return {
                spring: yearLength === 366 ? 79  : 78,
                summer: yearLength === 366 ? 172 : 171,
                autumn: yearLength === 366 ? 265 : 264,
                winter: yearLength === 366 ? 355 : 354
            };
        }

        function daylightValue(doy0, yearLength){
            const { summer } = getSolarAnchors(yearLength);
            const phase = (doy0 - summer) / yearLength * 2 * Math.PI;
            return (Math.cos(phase) + 1) / 2;
        }

        function beadGrayIndexFromValue(v){
            return Math.round(55 + v * 200);
        }

        function circularSignedDelta(from, to, N){
            let d = to - from;
            if (d > N / 2) d -= N;
            if (d < -N / 2) d += N;
            return d;
        }

        function buildMirrorMapFromDaylightValues(days){
            const mirrorMap = new Map();

            for (const day of days){
                const { summer } = getSolarAnchors(day.yearLength);
                const reflectedTarget = mod(2 * summer - day.doy, day.yearLength);

                let best = day;
                let bestValueDiff = Infinity;
                let bestTargetDiff = Infinity;
                let bestSelfPenalty = Infinity;

                for (const candidate of days){
                    if (candidate.yearLength !== day.yearLength) continue;

                    const valueDiff = Math.abs(candidate.lightValue - day.lightValue);
                    const targetDiff = Math.abs(circularSignedDelta(reflectedTarget, candidate.doy, day.yearLength));
                    const selfPenalty = candidate.doy === day.doy ? 1 : 0;

                    const isBetter =
                        valueDiff < bestValueDiff - EPS ||
                        (
                            Math.abs(valueDiff - bestValueDiff) <= EPS &&
                            targetDiff < bestTargetDiff - EPS
                        ) ||
                        (
                            Math.abs(valueDiff - bestValueDiff) <= EPS &&
                            Math.abs(targetDiff - bestTargetDiff) <= EPS &&
                            selfPenalty < bestSelfPenalty
                        );

                    if (isBetter){
                        best = candidate;
                        bestValueDiff = valueDiff;
                        bestTargetDiff = targetDiff;
                        bestSelfPenalty = selfPenalty;
                    }
                }

                mirrorMap.set(day.doy, best.doy);
            }

            return mirrorMap;
        }

        function formatShortDate(date){
            return date.toLocaleDateString(t().dateLocale, {
                day: 'numeric',
                month: 'long'
            });
        }

        function formatLongDate(date){
            return date.toLocaleDateString(t().dateLocale, {
                weekday:'long',
                year:'numeric',
                month:'long',
                day:'numeric'
            });
        }

        function formatRangeDate(date){
            return date.toLocaleDateString(t().dateLocale, {
                day:"numeric",
                month:"long",
                year:"numeric"
            });
        }

        function el(name, attrs = {}, parent = null){
            const n = document.createElementNS('http://www.w3.org/2000/svg', name);
            for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
            if (parent) parent.appendChild(n);
            return n;
        }

        function screenToWorld(clientX, clientY){
            const pt = svg.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            const ctm = root.getScreenCTM();
            if (!ctm) return { x: 0, y: 0 };
            const out = pt.matrixTransform(ctm.inverse());
            return { x: out.x, y: out.y };
        }

        function circularMidpoint(a, b, N){
            const d = mod(b - a, N);
            return mod(a + d / 2, N);
        }

        const root = el('g', {}, svg);
        const layerGuides = el('g', {}, root);
        const layerLines  = el('g', {}, root);
        const layerDays   = el('g', {}, root);

        let ringLine = null;
        let ringLineStrong = null;
        let allDays = [];

        let view = { x: 0, y: 0, scale: 1 };
        let activeMirror = null;
        let activeHover = null;

        let panelDragging = false;
        let panelOffsetX = 0;
        let panelOffsetY = 0;
        let panelMoved = false;

        function applyView(){
            root.setAttribute('transform', `translate(${view.x},${view.y}) scale(${view.scale})`);
        }

        function clampCenterInfoToViewport(){
            if (!panelMoved) return;

            const rect = centerInfo.getBoundingClientRect();
            const pad = 12;

            let left = rect.left;
            let top = rect.top;

            if (rect.left < pad) left = pad;
            if (rect.top < pad) top = pad;
            if (rect.right > window.innerWidth - pad) {
                left = window.innerWidth - rect.width - pad;
            }
            if (rect.bottom > window.innerHeight - pad) {
                top = window.innerHeight - rect.height - pad;
            }

            centerInfo.style.left = `${Math.max(pad, left)}px`;
            centerInfo.style.top = `${Math.max(pad, top)}px`;
        }

        function resetView(){
            const svgRect = svg.getBoundingClientRect();

            const hudRect = document.querySelector('.hud')?.getBoundingClientRect();
            const hintRect = document.querySelector('.hint')?.getBoundingClientRect();

            const safePad = 24;

            const leftBound = safePad;
            const rightBound = svgRect.width - safePad;

            const topBound = hudRect ? (hudRect.bottom + safePad) : safePad;
            const bottomBound = hintRect ? (hintRect.top - safePad) : (svgRect.height - safePad);

            const safeWidth = Math.max(120, rightBound - leftBound);
            const safeHeight = Math.max(120, bottomBound - topBound);

            const safeCenterX = leftBound + safeWidth / 2;
            const safeCenterY = topBound + safeHeight / 2;

            const modelRadius = allDays.length
                ? Math.max(...allDays.map(d => Math.hypot(d.x, d.y)))
                : 320;

            const extraForLabels = window.innerWidth < 700 ? 84 : 70;
            const contentRadius = modelRadius + extraForLabels;

            const fitScaleX = safeWidth / (contentRadius * 2);
            const fitScaleY = safeHeight / (contentRadius * 2);
            const fitScale = Math.min(fitScaleX, fitScaleY, 1);

            view.scale = clamp(fitScale, 0.25, 1);
            view.x = safeCenterX;
            view.y = safeCenterY;

            applyView();
            zoomEl.value = String(Math.round(view.scale * 100));
        }

        let panning = false;
        let panStart = { x: 0, y: 0, vx: 0, vy: 0 };

        svg.addEventListener('pointerdown', (e) => {
            if (e.target.closest && e.target.closest('.day')) return;
            panning = true;
            svg.classList.add('dragging');
            svg.setPointerCapture(e.pointerId);
            panStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y };
        });

        svg.addEventListener('pointermove', (e) => {
            if (!panning) return;
            view.x = panStart.vx + (e.clientX - panStart.x);
            view.y = panStart.vy + (e.clientY - panStart.y);
            applyView();
        });

        function stopPan(){
            panning = false;
            svg.classList.remove('dragging');
        }

        svg.addEventListener('pointerup', stopPan);
        svg.addEventListener('pointercancel', stopPan);
        svg.addEventListener('pointerleave', () => {
            if (panning) stopPan();
        });

        svg.addEventListener('wheel', (e) => {
            e.preventDefault();

            const rect = svg.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const wx = (mx - view.x) / view.scale;
            const wy = (my - view.y) / view.scale;

            const zoomFactor = Math.exp(-e.deltaY * 0.0013);
            const newScale = clamp(view.scale * zoomFactor, 0.25, 5);

            view.scale = newScale;
            view.x = mx - wx * view.scale;
            view.y = my - wy * view.scale;

            zoomEl.value = String(Math.round(view.scale * 100));
            applyView();
        }, { passive:false });

        zoomEl.addEventListener('input', () => {
            const targetScale = Number(zoomEl.value) / 100;
            const { width, height } = svg.getBoundingClientRect();
            const cx = width / 2;
            const cy = height / 2;

            const wx = (cx - view.x) / view.scale;
            const wy = (cy - view.y) / view.scale;

            view.scale = clamp(targetScale, 0.25, 5);
            view.x = cx - wx * view.scale;
            view.y = cy - wy * view.scale;
            applyView();
        });

        resetEl.addEventListener('click', resetView);

        centerInfo.addEventListener('pointerdown', (e) => {
            e.stopPropagation();

            panelDragging = true;
            centerInfo.classList.add('dragging');

            const rect = centerInfo.getBoundingClientRect();
            panelOffsetX = e.clientX - rect.left;
            panelOffsetY = e.clientY - rect.top;

            centerInfo.setPointerCapture(e.pointerId);
        });

        centerInfo.addEventListener('pointermove', (e) => {
            if (!panelDragging) return;

            if (!panelMoved){
                const rect = centerInfo.getBoundingClientRect();
                centerInfo.style.left = rect.left + "px";
                centerInfo.style.top = rect.top + "px";
                centerInfo.style.transform = "none";
                panelMoved = true;
            }

            const x = e.clientX - panelOffsetX;
            const y = e.clientY - panelOffsetY;

            centerInfo.style.left = x + "px";
            centerInfo.style.top = y + "px";

            clampCenterInfoToViewport();
        });

        function stopPanelDrag(e){
            if (!panelDragging) return;
            panelDragging = false;
            centerInfo.classList.remove('dragging');
            try {
                centerInfo.releasePointerCapture(e.pointerId);
            } catch {}
            clampCenterInfoToViewport();
        }

        centerInfo.addEventListener('pointerup', stopPanelDrag);
        centerInfo.addEventListener('pointercancel', stopPanelDrag);

        function clearMirrorHighlight(){
            if (activeMirror){
                activeMirror.g.classList.remove('mirror-match');
                activeMirror = null;
            }
            if (activeHover){
                activeHover.g.classList.remove('active-hover');
                activeHover = null;
            }
        }

        function setActiveDay(it, daysByDoy){
            clearMirrorHighlight();

            activeHover = it;
            it.g.classList.add('active-hover');

            const mirrorIt = daysByDoy.get(it.mirrorDoy) || null;

            if (mirrorIt && mirrorIt !== it){
                activeMirror = mirrorIt;
                mirrorIt.g.classList.add('mirror-match');
            }

            showCenterInfo(it, mirrorIt);
        }

        function showCenterInfo(it, mirrorIt){
            centerDate.textContent = formatLongDate(it.d);

            centerMeta.textContent = t().centerMeta({
                dayIndex: it.doy + 1,
                yearLength: it.yearLength,
                value: it.lightValue.toFixed(6),
                gray: it.grayIndex
            });

            if (mirrorIt && mirrorIt !== it){
                centerRelation.textContent = t().centerRelationMirror({
                    date: formatShortDate(it.d),
                    mirrorDate: formatShortDate(mirrorIt.d)
                });
            } else {
                centerRelation.textContent = t().centerRelationSame({
                    date: formatShortDate(it.d)
                });
            }

            if (it.isToday){
                centerTag.style.display = 'inline-block';
                centerTag.textContent = t().today;
            } else if (it.tag){
                centerTag.style.display = 'inline-block';
                centerTag.textContent = it.tag;
            } else {
                centerTag.style.display = 'none';
            }

            centerInfo.style.opacity = '1';
        }

        function hideCenterInfo(){
            centerInfo.style.opacity = '0';
        }

        function updateLinePositions(){
            if (!ringLine || !ringLineStrong || lineModeEl.value !== 'poly') return;
            const pts = allDays.map(p => `${p.x},${p.y}`).join(' ');
            ringLine.setAttribute('points', pts);
            ringLineStrong.setAttribute('points', pts);
        }

        function updateMonthGuidePosition(it){
            if (!it.monthTick || !it.monthLabel) return;

            const tickLen = 18;
            const angle = Math.atan2(it.y, it.x);

            const x1 = it.x - Math.cos(angle) * tickLen;
            const y1 = it.y - Math.sin(angle) * tickLen;
            const x2 = it.x + Math.cos(angle) * tickLen;
            const y2 = it.y + Math.sin(angle) * tickLen;

            it.monthTick.setAttribute('x1', x1);
            it.monthTick.setAttribute('y1', y1);
            it.monthTick.setAttribute('x2', x2);
            it.monthTick.setAttribute('y2', y2);

            const lr = Math.hypot(it.x, it.y) + 38;
            const lx = Math.cos(angle) * lr;
            const ly = Math.sin(angle) * lr;

            it.monthLabel.setAttribute('x', lx);
            it.monthLabel.setAttribute('y', ly);
        }

        function updateDayPosition(it){
            if (!it.mainCircle) return;
            it.mainCircle.setAttribute('cx', it.x);
            it.mainCircle.setAttribute('cy', it.y);

            if (it.monthDot){
                it.monthDot.setAttribute('cx', it.x);
                it.monthDot.setAttribute('cy', it.y);
            }

            updateMonthGuidePosition(it);
        }

        function makeDayDraggable(it, daysByDoy){
            const g = it.g;
            let isDragging = false;
            let dragPointerId = null;
            let offset = { x: 0, y: 0 };

            g.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();

                dragPointerId = e.pointerId;
                g.setPointerCapture(dragPointerId);
                isDragging = true;
                g.classList.add('dragging-day');

                const world = screenToWorld(e.clientX, e.clientY);
                offset.x = world.x - it.x;
                offset.y = world.y - it.y;

                setActiveDay(it, daysByDoy);
            });

            g.addEventListener('pointermove', (e) => {
                if (!isDragging || e.pointerId !== dragPointerId) return;

                const world = screenToWorld(e.clientX, e.clientY);
                it.x = world.x - offset.x;
                it.y = world.y - offset.y;

                updateDayPosition(it);
                updateLinePositions();
            });

            function stopDragging(e){
                if (!isDragging || e.pointerId !== dragPointerId) return;
                isDragging = false;
                g.classList.remove('dragging-day');
                try { g.releasePointerCapture(dragPointerId); } catch {}
                dragPointerId = null;
            }

            g.addEventListener('pointerup', stopDragging);
            g.addEventListener('pointercancel', stopDragging);
        }

        function buildQuarterTicks(baseRadius, spiralAmp, topIndex, N){
            const anchors = getSolarAnchors(N);

            const quarterBoundaries = [
                circularMidpoint(anchors.spring, anchors.summer, N),
                circularMidpoint(anchors.summer, anchors.autumn, N),
                circularMidpoint(anchors.autumn, anchors.winter, N),
                circularMidpoint(anchors.winter, anchors.spring, N)
            ];

            const tickLen = 34;

            for (const boundary of quarterBoundaries){
                const circularIndex = mod(boundary - topIndex, N);
                const theta = (circularIndex / N) * Math.PI * 2 - Math.PI / 2;

                const r = baseRadius + spiralAmp * 0.5;

                const x1 = (r - tickLen) * Math.cos(theta);
                const y1 = (r - tickLen) * Math.sin(theta);
                const x2 = (r + tickLen) * Math.cos(theta);
                const y2 = (r + tickLen) * Math.sin(theta);

                el('line', {
                    x1, y1, x2, y2,
                    class: 'quarterTick'
                }, layerGuides);
            }
        }

        function buildCalendar(){
            layerGuides.innerHTML = '';
            layerLines.innerHTML = '';
            layerDays.innerHTML = '';
            clearMirrorHighlight();
            ringLine = null;
            ringLineStrong = null;
            allDays = [];

            const today = new Date();
            const currentYear = today.getFullYear();
            const startDate = new Date(currentYear, 0, 1);
            const endDate = new Date(currentYear + 1, 0, 1);
            const N = Math.round((endDate - startDate) / 86400000);

            const startMode = startModeEl.value;
            const topIndex = startMode === 'solstice'
                ? dayOfYear0(new Date(currentYear, 5, 21))
                : 0;

            subtitle.textContent = t().subtitle({
                year: currentYear,
                days: N,
                top: startMode === 'solstice' ? t().subtitleTopSolstice : t().subtitleTopJan1
            });

            const beadR = Number(sizeEl.value);
            const baseRadius = Math.max(260, N * beadR * 0.3);
            const spiralAmp = Math.max(16, beadR * 5);

            const monthNames = t().monthNames;
            const days = [];
            const daysByDoy = new Map();

            const todayKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

            for (let i = 0; i < N; i++){
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);

                const yearLength = isLeapYear(d.getFullYear()) ? 366 : 365;
                const doy = dayOfYear0(d);

                const circularIndex = mod(i - topIndex, N);
                const theta = (circularIndex / N) * Math.PI * 2 - Math.PI / 2;

                const spiral = (Math.sin(i * 0.035) * 0.5 + 0.5) * spiralAmp;
                const r = baseRadius + spiral;

                const x = r * Math.cos(theta);
                const y = r * Math.sin(theta);

                const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
                const isToday = key === todayKey;

                const lightValue = daylightValue(doy, yearLength);
                const grayIndex = beadGrayIndexFromValue(lightValue);
                const fill = `rgb(${grayIndex},${grayIndex},${grayIndex})`;
                const tag = specialTag(d);

                const item = {
                    i, d, x, y, theta, r,
                    isToday, fill, tag, doy, yearLength,
                    lightValue, grayIndex, mirrorDoy: null,
                    g: null,
                    mainCircle: null,
                    monthDot: null,
                    monthTick: null,
                    monthLabel: null
                };

                days.push(item);
                daysByDoy.set(doy, item);
            }

            allDays = days;

            buildQuarterTicks(baseRadius, spiralAmp, topIndex, N);

            const mirrorMap = buildMirrorMapFromDaylightValues(days);
            for (const day of days){
                day.mirrorDoy = mirrorMap.get(day.doy);
            }

            stats.textContent = t().statsRange({
                from: formatRangeDate(days[0].d),
                to: formatRangeDate(days[days.length - 1].d)
            });

            const monthFirstIndex = [];
            for (let m = 0; m < 12; m++){
                const idx = days.findIndex(day => day.d.getMonth() === m && day.d.getDate() === 1);
                if (idx >= 0) monthFirstIndex.push(idx);
            }

            for (const idx of monthFirstIndex){
                const it = days[idx];
                const m = it.d.getMonth();

                it.monthTick = el('line', { class: 'monthTick' }, layerGuides);
                it.monthLabel = el('text', { class: 'monthLabel' }, layerGuides);
                it.monthLabel.textContent = monthNames[m];
                updateMonthGuidePosition(it);
            }

            if (lineModeEl.value === 'poly'){
                const pts = days.map(p => `${p.x},${p.y}`).join(' ');
                ringLine = el('polyline', { points: pts, class: 'ringLine' }, layerLines);
                ringLineStrong = el('polyline', { points: pts, class: 'ringLine strong' }, layerLines);
            }

            for (const it of days){
                const g = el('g', { class: `day${it.isToday ? ' today' : ''}${it.tag ? ' special' : ''}` }, layerDays);
                it.g = g;

                const isMonthStart = it.d.getDate() === 1;
                const baseRDay = isMonthStart ? beadR + 1.4 : beadR;
                const hoverR = Math.max(baseRDay + 4, baseRDay * 2);

                g.style.setProperty('--r', `${baseRDay}px`);
                g.style.setProperty('--rh', `${hoverR}px`);

                it.mainCircle = el('circle', {
                    cx: it.x,
                    cy: it.y,
                    fill: it.fill,
                    class: `day-main${it.isToday ? ' today-main' : ''}`
                }, g);

                if (isMonthStart){
                    it.monthDot = el('circle', {
                        cx: it.x,
                        cy: it.y,
                        r: Math.max(1.6, beadR * 0.35),
                        fill: '#111'
                    }, g);
                }

                g.addEventListener('pointerenter', () => {
                    setActiveDay(it, daysByDoy);
                });

                makeDayDraggable(it, daysByDoy);
            }
        }

        function rebuild(){
            hideCenterInfo();
            applyStaticI18n();
            buildCalendar();
            resetView();
            clampCenterInfoToViewport();
        }

        let resizeRaf = 0;
        window.addEventListener('resize', () => {
            cancelAnimationFrame(resizeRaf);
            resizeRaf = requestAnimationFrame(() => {
                rebuild();
            });
        });

        languageModeEl.addEventListener('change', () => {
            currentLang = languageModeEl.value;
            rebuild();
        });

        startModeEl.addEventListener('change', rebuild);
        lineModeEl.addEventListener('change', rebuild);
        sizeEl.addEventListener('input', rebuild);

        applyStaticI18n();
        buildCalendar();
        resetView();
    })();
</script>
</body>
